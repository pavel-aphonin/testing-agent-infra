# Testing Agent — docker-compose for local development
#
# Expects sibling repos cloned at:
#   ../testing-agent-backend
#   ../testing-agent-frontend
#   ../testing-agent-llm
#   ../testing-agent-explorer
#
# First-time setup:
#   cp .env.example .env
#   # edit .env
#   docker compose up -d

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./volumes/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ta-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - ./volumes/redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ../testing-agent-backend
      dockerfile: Dockerfile
    container_name: ta-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRES_MIN: ${JWT_ACCESS_TOKEN_EXPIRES_MIN}
      JWT_REFRESH_TOKEN_EXPIRES_DAYS: ${JWT_REFRESH_TOKEN_EXPIRES_DAYS}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD}
      WORKER_TOKEN: ${WORKER_TOKEN}
      # On macOS we run llama-server natively on the host (Metal needs the
      # real GPU, not the Docker VM), so the backend reaches it through
      # host.docker.internal. On Linux/CUDA this is overridden to
      # http://llm:8080 by the `full` profile.
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:8080}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-http://host.docker.internal:8082}
      RAG_LLM_BASE_URL: ${RAG_LLM_BASE_URL:-http://host.docker.internal:8083}
      RERANKER_BASE_URL: ${RERANKER_BASE_URL:-http://host.docker.internal:8084}
      LLM_MODELS_DIR: /var/lib/llm-models
      APP_UPLOADS_DIR: /var/lib/app-uploads
    ports:
      - "${BACKEND_PORT}:8000"
    volumes:
      - ${LLM_MODELS_DIR}:/var/lib/llm-models
      - ${APP_UPLOADS_DIR:-./volumes/app-uploads}:/var/lib/app-uploads
      # Live reload during development
      - ../testing-agent-backend/app:/app/app:ro
      # Alembic migrations mounted RW so `alembic revision --autogenerate`
      # from inside the container writes new files back to the host repo.
      - ../testing-agent-backend/alembic:/app/alembic
      - ../testing-agent-backend/alembic.ini:/app/alembic.ini:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Worker — claims runs from the backend and executes them.
  #
  # Default executor is `synthetic` which generates fake screens/edges and
  # is perfect for demos and CI: no Xcode, no simulator, no Appium needed.
  # The pipe (worker → backend → Postgres → Redis → WebSocket → browser)
  # is exactly the same as a real run.
  #
  # For real iOS exploration (`--executor real`) the worker must run on
  # the host (not in Docker) because it shells out to xcrun / Appium / AXe.
  # See testing-agent-infra/README.md "Running the worker outside Docker".
  worker:
    build:
      context: ../testing-agent-explorer
      dockerfile: Dockerfile
    container_name: ta-worker
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      TA_BACKEND_URL: http://backend:8000
      TA_WORKER_TOKEN: ${WORKER_TOKEN}
    # Override the image's CLI entrypoint with the worker daemon.
    entrypoint: ["python", "-m", "explorer.worker"]
    command:
      - "--backend-url"
      - "http://backend:8000"
      - "--executor"
      - "synthetic"
      - "-v"

  # frontend is part of the default stack now that Block 6 has landed.

  frontend:
    build:
      context: ../testing-agent-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: ta-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT}:80"

  # llama.cpp + llama-swap. Gated behind the `full` profile because Docker
  # Desktop on macOS can't access Apple Silicon Metal — running in-container
  # on a Mac is unusably slow for a 35B MoE model. Targets are:
  #
  #   - Linux + NVIDIA (CUDA build of llama.cpp): docker-native, just run
  #     `docker compose --profile full up -d llm`.
  #   - macOS dev on M-series: skip this service entirely and run llama.cpp
  #     + llama-swap natively on the host. See testing-agent-infra/README.md
  #     "First-time LLM setup → Option B" for the full recipe.
  #
  # The backend writes /var/lib/llm-models/llama-swap.yaml after every
  # CRUD on llm_models; this container picks up the change via
  # `-watch-config` without a restart.
  llm:
    profiles: ["full"]
    build:
      context: ../testing-agent-llm
      dockerfile: Dockerfile
    container_name: ta-llm
    restart: unless-stopped
    ports:
      - "${LLM_PORT}:8080"
    volumes:
      - ${LLM_MODELS_DIR}:/var/lib/llm-models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

networks:
  default:
    name: testing-agent
