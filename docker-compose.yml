# Testing Agent — docker-compose for local development
#
# Expects sibling repos cloned at:
#   ../testing-agent-backend
#   ../testing-agent-frontend
#   ../testing-agent-llm
#   ../testing-agent-explorer
#
# First-time setup:
#   cp .env.example .env
#   # edit .env
#   docker compose up -d

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - ./volumes/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ta-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - ./volumes/redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # PER-169: FalkorDB — graph database backend for Graphiti
  # episodic memory. Sparse-matrix-based query engine (≈345×
  # faster than Neo4j on p99 per FalkorDB benchmarks). Used by
  # the explorer worker to record agent actions as episodes and
  # recall them via semantic search, so chat-LLM can see «PIN
  # уже введён 8520, нажми Forward» instead of looping on the
  # same digit 5 times. Exposed on host port 6380 to avoid
  # conflicting with Redis on 6379. Uses the official FalkorDB
  # image which bundles RedisGraph protocol + REST + Browser UI
  # on :3000 (container-internal, optional to expose).
  falkordb:
    image: falkordb/falkordb:latest
    container_name: ta-falkordb
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - ./volumes/falkordb-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ../testing-agent-backend
      dockerfile: Dockerfile
    container_name: ta-backend
    restart: unless-stopped
    # PER-118: opt in to Filebeat ingestion. ``markov.service`` is used
    # by the Filebeat index pattern (markov-<service>-YYYY.MM.DD).
    labels:
      markov.log: "true"
      markov.service: "backend"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRES_MIN: ${JWT_ACCESS_TOKEN_EXPIRES_MIN}
      JWT_REFRESH_TOKEN_EXPIRES_DAYS: ${JWT_REFRESH_TOKEN_EXPIRES_DAYS}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD}
      WORKER_TOKEN: ${WORKER_TOKEN}
      # On macOS we run llama-server natively on the host (Metal needs the
      # real GPU, not the Docker VM), so the backend reaches it through
      # host.docker.internal. On Linux/CUDA this is overridden to
      # http://llm:8080 by the `full` profile.
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:8080}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-http://host.docker.internal:8082}
      RAG_LLM_BASE_URL: ${RAG_LLM_BASE_URL:-http://host.docker.internal:8083}
      RERANKER_BASE_URL: ${RERANKER_BASE_URL:-http://host.docker.internal:8084}
      LLM_MODELS_DIR: /var/lib/llm-models
      APP_UPLOADS_DIR: /var/lib/app-uploads
      # PER-118: centralised logging. Backend reads these to decide
      # whether to emit JSON-formatted logs (any value other than
      # ``none`` flips the formatter to JSON; ``elasticsearch`` and
      # ``external`` are functionally identical from the app side —
      # the difference is only in where Filebeat / the customer's
      # collector picks them up).
      LOGGING_BACKEND: ${LOGGING_BACKEND:-none}
    ports:
      - "${BACKEND_PORT}:8000"
    volumes:
      - ${LLM_MODELS_DIR}:/var/lib/llm-models
      - ${APP_UPLOADS_DIR:-./volumes/app-uploads}:/var/lib/app-uploads
      # Live reload during development
      - ../testing-agent-backend/app:/app/app:ro
      # Alembic migrations mounted RW so `alembic revision --autogenerate`
      # from inside the container writes new files back to the host repo.
      - ../testing-agent-backend/alembic:/app/alembic
      - ../testing-agent-backend/alembic.ini:/app/alembic.ini:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # PER-48: worker service intentionally NOT in docker-compose.
  #
  # Worker shells out to `xcrun simctl` / Appium / AXe — these live on the
  # host macOS and are not reachable from inside a Linux container. The
  # synthetic-mode worker that used to live here generated fake graphs and
  # silently swallowed real-app uploads, confusing every user who tried to
  # run a real .app.zip through it.
  #
  # Run the worker on the host instead:
  #
  #     make worker-start          # foreground, useful for first run
  #     make worker-install         # install launchd agent (auto-start)
  #     make worker-status          # check if it's running
  #
  # See README.md → "Запуск worker на хосте".

  # PER-51: corporate security suites on macOS (Norton 360, McAfee,
  # Symantec, …) set up a system-wide HTTP proxy via ``scutil --proxy``
  # that intercepts even loopback TCP. The fix turned out to be in the
  # worker itself: ``httpx.AsyncClient(trust_env=False)`` makes httpx
  # ignore both env vars AND the macOS system proxy, talking directly
  # to backend over loopback.
  #
  # We tried a UDS bridge through a socat sidecar here, but bind-mounting
  # Unix sockets between Docker Desktop's Linux VM and the macOS host is
  # broken (docker/for-mac#5540): the file appears on the host, but
  # connect() never reaches the listener inside the container. The
  # trust_env=False fix makes the bridge unnecessary.

  # frontend is part of the default stack now that Block 6 has landed.

  frontend:
    build:
      context: ../testing-agent-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: ta-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT}:80"

  # ── PER-118: centralised logging (ELK) ─────────────────────────────────
  # Three modes, controlled by LOGGING_BACKEND in .env:
  #   elasticsearch (default) → bring up these three containers under the
  #                              `logging` profile; backend + worker JSON
  #                              logs flow into Elasticsearch via Filebeat
  #                              and are visible in Kibana on :5601.
  #   external                → don't run these; backend + worker ship
  #                              straight to ${ELASTICSEARCH_URL} (e.g.
  #                              the customer's existing ELK).
  #   none                    → don't run these; everything stays in
  #                              container stdout exactly as before.
  #
  # All three containers stay behind the `logging` profile so users who
  # picked `external` or `none` never spin them up by accident:
  #     docker compose --profile logging up -d
  # See testing-agent-infra/README.md → "Логирование" for the full guide.

  elasticsearch:
    profiles: ["logging"]
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: ta-elasticsearch
    restart: unless-stopped
    environment:
      # Single-node mode — fine for local dev / small on-prem demos.
      # Production deploys at the customer should point at their own
      # multi-node cluster via LOGGING_BACKEND=external instead.
      discovery.type: single-node
      xpack.security.enabled: "false"
      # Heap kept modest so an idle dev box doesn't hit the JVM-locked
      # 1GB minimum. Bump for heavier ingestion.
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - ./volumes/elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -q '\"status\":\"\\(green\\|yellow\\)\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  kibana:
    profiles: ["logging"]
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: ta-kibana
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: "http://elasticsearch:9200"
      # Russian locale for the demo — matches the rest of the UI.
      I18N_LOCALE: "ru-RU"
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  filebeat:
    profiles: ["logging"]
    image: docker.elastic.co/beats/filebeat:8.13.0
    container_name: ta-filebeat
    restart: unless-stopped
    # Filebeat needs to read container logs through the docker daemon
    # socket and parse the per-container JSON log files written by
    # docker's default ``json-file`` log driver.
    user: root
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./elk/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./volumes/filebeat-data:/usr/share/filebeat/data
      # PER-118: explorer worker runs on the host (Apple Metal access),
      # so its log file isn't a docker container log. Mount the host
      # /tmp into Filebeat read-only so the same daemon picks up both
      # container output and worker file logs.
      #
      # PER-163 retry #3: mount via the **resolved** path
      # ``/private/tmp`` (which is what ``/tmp`` symlinks to on
      # macOS) rather than ``/tmp`` itself. Docker Desktop's
      # VirtioFS file sharing has the resolved ``/private`` in its
      # shared list — the ``/tmp`` symlink works for initial
      # access but VirtioFS does not propagate file size/mtime
      # updates through the symlink to the container view (we
      # observed host file at 36144 bytes while ``/host/tmp/...``
      # inside Filebeat stayed at 33459 indefinitely). Mounting
      # the resolved path lets VirtioFS see the appends and
      # forward them; Filebeat then ingests fresh llama-server
      # log lines without manual ``docker restart ta-filebeat``.
      - /private/tmp:/host/tmp:ro
    command: ["--strict.perms=false"]
    healthcheck:
      test: ["CMD-SHELL", "pgrep filebeat >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5

  # llama.cpp + llama-swap. Gated behind the `full` profile because Docker
  # Desktop on macOS can't access Apple Silicon Metal — running in-container
  # on a Mac is unusably slow for a 35B MoE model. Targets are:
  #
  #   - Linux + NVIDIA (CUDA build of llama.cpp): docker-native, just run
  #     `docker compose --profile full up -d llm`.
  #   - macOS dev on M-series: skip this service entirely and run llama.cpp
  #     + llama-swap natively on the host. See testing-agent-infra/README.md
  #     "First-time LLM setup → Option B" for the full recipe.
  #
  # The backend writes /var/lib/llm-models/llama-swap.yaml after every
  # CRUD on llm_models; this container picks up the change via
  # `-watch-config` without a restart.
  llm:
    profiles: ["full"]
    build:
      context: ../testing-agent-llm
      dockerfile: Dockerfile
    container_name: ta-llm
    restart: unless-stopped
    ports:
      - "${LLM_PORT}:8080"
    volumes:
      - ${LLM_MODELS_DIR}:/var/lib/llm-models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

networks:
  default:
    name: testing-agent
