# Filebeat — collects docker container logs and ships them to Elasticsearch.
#
# PER-118: backend + worker emit one-line JSON to stdout; Docker's default
# json-file log driver captures that in /var/lib/docker/containers/<id>/<id>-json.log.
# We auto-discover those files via the `container` input + add_docker_metadata
# processor so each event gets enriched with container name, image, labels, etc.
#
# Only containers carrying the label ``markov.log=true`` (set on backend +
# worker — workers run on the host but Vector / a future sidecar will add it)
# are forwarded; anything else (postgres, redis, elasticsearch itself) goes
# nowhere to keep the index lean.

filebeat.inputs:
  - type: container
    paths:
      - /var/lib/docker/containers/*/*.log
    # JSON-decode the message body if it parses, otherwise keep raw.
    # ``add_error_key`` makes broken JSON visible in Kibana under
    # ``error.message`` instead of silently dropped.
    json.keys_under_root: true
    json.add_error_key: true
    json.message_key: message

  # PER-118: explorer worker logs (host-side Python process). The host
  # /tmp is bind-mounted to /host/tmp in this container so we can tail
  # the same files the worker writes. ``markov.service: worker`` is
  # forced via fields because there's no docker label on host files.
  - type: log
    enabled: true
    paths:
      - /host/tmp/ta-worker.log
    # Worker emits JSON when LOGGING_BACKEND != none; otherwise the
    # raw line lands in ``message`` and the index still gets it.
    json.keys_under_root: true
    json.add_error_key: true
    json.message_key: message
    fields:
      container:
        labels:
          markov_log: "true"
          markov_service: "worker"
    fields_under_root: true

  # PER-163: llama-server logs (chat + RAG stack). When an LLM call
  # misbehaves — wrong image-token budget, broken chat template, GBNF
  # rejection, MoE cold-start timeouts — the worker's log only shows
  # the symptom ("llm_no_decision"). The cause lives in
  # /tmp/ta-llama-chat.log (and -embed/-rag/-rerank for the RAG
  # stack). Ingesting them into ELK lets us correlate worker decisions
  # with llama-server's view of the same request in Kibana.
  - type: log
    enabled: true
    paths:
      - /host/tmp/ta-llama-chat.log
      - /host/tmp/ta-llama-grounder.log
      - /host/tmp/ta-llama-embed.log
      - /host/tmp/ta-llama-rag.log
      - /host/tmp/ta-llama-rerank.log
    # llama-server logs are plain text (key=value lines). No JSON
    # decoding — message stays as-is so Kibana full-text searches it.
    #
    # PER-163 retry #3 / PER-167: Docker Desktop's gRPC-FUSE bind
    # mount does NOT propagate file size/mtime updates to the
    # container side after the initial mount snapshot. Symptom:
    # host /tmp/ta-llama-chat.log grows on append, container
    # /host/tmp/ta-llama-chat.log stays frozen, Filebeat sees no
    # new bytes, markov-llama-* never updates.
    #
    # Workaround: force the harvester to close the file handle
    # frequently. Each close + re-open triggers a fresh stat()
    # via the FUSE layer, which DOES re-fetch the host file's
    # actual size at that moment. scan_frequency controls how
    # often Filebeat discovers files (so re-open is cheap);
    # close_inactive forces the close even when reads are still
    # returning data (overkill normally, exactly what we need
    # here). The result: at most close_inactive + scan_frequency
    # delay between host append and ELK ingestion (~5s), with no
    # manual ``docker restart ta-filebeat`` needed.
    scan_frequency: 2s
    close_inactive: 5s
    close_renamed: true
    close_removed: true
    # PER-167: clean the registry entry once the inode hasn't been seen
    # for ``clean_inactive``. Without this, every ad-hoc llama-server
    # restart (debugging, model switching via CLI, ``> /tmp/ta-llama-
    # chat.log`` redirects) leaves a stale registry row keyed on the
    # old inode forever — the registry grows indefinitely and old
    # rows confuse Filebeat's «have we seen this file» logic on the
    # next start. 2 minutes is comfortably longer than clean_inactive
    # is required to be (>= ignore_older + scan_frequency), and short
    # enough that a one-off restart cleans itself up within minutes
    # of being abandoned.
    clean_inactive: 2m
    # PER-167: don't tail historic logs that haven't been touched in
    # over an hour. Stops Filebeat from re-ingesting an old day's
    # ``ta-llama-chat.log`` after a Mac reboot when systemd-style
    # rotation puts the file back at offset 0.
    ignore_older: 1h
    fields:
      container:
        labels:
          markov_log: "true"
          markov_service: "llama"
    fields_under_root: true

processors:
  # Tag every event with the container's docker metadata — name, image,
  # compose project, labels. Kibana can then filter by container.name.
  - add_docker_metadata:
      host: "unix:///var/run/docker.sock"
  # PER-118: when the application emits JSON in its stdout line (i.e.
  # the message body itself starts with ``{``), parse those fields up
  # so Kibana can filter by ``service`` / ``logger`` / ``log.level`` /
  # ``run_id`` etc. as proper indexed columns instead of full-text
  # searching the ``message`` string. ``ignore_failure`` keeps the
  # log line if it's plain text — we still get the raw message,
  # just without structured columns.
  - decode_json_fields:
      fields: ["message"]
      target: ""
      overwrite_keys: true
      add_error_key: false
      max_depth: 2
      process_array: false
      when:
        regexp:
          message: "^\\{"
  # PER-118: only forward containers that opted in via the markov.log
  # label. Other services (postgres / redis / kibana / elasticsearch /
  # filebeat itself) skip — keeps the index focused on our app logs.
  - drop_event:
      when:
        not:
          equals:
            container.labels.markov_log: "true"
  # Trim noisy filebeat-internal fields that aren't useful for app debugging.
  - drop_fields:
      fields: ["agent", "ecs", "host", "input", "log.offset", "stream"]
      ignore_missing: true

output.elasticsearch:
  hosts: ["http://elasticsearch:9200"]
  # Index per service per day. Kibana can search across all of them with
  # the data view ``markov-*``.
  index: "markov-%{[container.labels.markov_service]:unknown}-%{+yyyy.MM.dd}"

setup.template.name: "markov"
setup.template.pattern: "markov-*"
setup.ilm.enabled: false

logging.level: info
logging.to_stderr: true
